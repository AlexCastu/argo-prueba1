apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-prueba1
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/AlexCastu/argo-prueba1.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
